<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문주현 | 예비 게임 개발자</title>
    <style>
        /* 전체 배경 및 폰트 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #1a1a2e; /* 다크 네이비 배경 */
            color: #eaeaea; /* 밝은 회색 텍스트 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 메인 콘텐츠를 담는 박스 */
        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 2px solid #0f3460;
        }

        /* 이름 (포인트 컬러) */
        h1 {
            color: #e94560; /* 네온 핑크/레드 계열 포인트 */
            font-size: 2.8em;
            margin-bottom: 10px;
            margin-top: 0;
        }

        /* 소제목 (나이, 직업) */
        .subtitle {
            color: #43bccd; /* 민트/블루 계열 포인트 */
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* 본문 텍스트 */
        p {
            line-height: 1.7;
            font-size: 1.1em;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        /* 하단 태그 섹션 */
        .tags {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #0f3460;
        }

        .tag {
            display: inline-block;
            background-color: #e94560;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
            font-weight: bold;
            transition: transform 0.2s; /* 마우스 오버 시 애니메이션 준비 */
        }

        .tag:hover {
            transform: scale(1.1); /* 마우스를 올리면 살짝 커지는 효과 */
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>문주현</h1>
        <div class="subtitle">🎮 고등학교 1학년 | 예비 게임 개발자</div>
        
        <p>
            안녕하세요! 제 GitHub 페이지에 오신 것을 환영합니다.<br>
            저는 사람들에게 잊지 못할 즐거움을 선사하는 <strong>게임 개발자</strong>를 꿈꾸고 있습니다.
        </p>
        <p>
            현재 고등학교에서 학업에 충실함과 동시에, 저만의 게임 세계를 창조하기 위해 프로그래밍과 게임 엔진을 꾸준히 공부하고 있습니다. 앞으로 제가 만들어갈 멋진 프로젝트들을 기대해 주세요!
        </p>
        
        <div class="tags">
            <span class="tag">#게임개발</span>
            <span class="tag">#프로그래밍</span>
            <span class="tag">#열정</span>
            <span class="tag">#도전</span>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문주현 | 소개 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(168, 85, 247, 0.14), transparent 25%),
        linear-gradient(135deg, #0b1120, #111827 45%, #1e293b 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
      position: relative;
      z-index: 2;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .highlight {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 18px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
      color: #e5e7eb;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .panel {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .panel-title {
      font-size: 13px;
      color: #93c5fd;
      margin-bottom: 6px;
    }

    .panel-text {
      font-size: 16px;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 28px 22px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <canvas id="snakeCanvas"></canvas>

  <div class="card" id="card">
    <h1>안녕하세요, 저는 <span class="highlight">문주현</span>입니다.</h1>
    <div class="subtitle">고등학교 1학년 · 게임개발자를 꿈꾸고 있습니다.</div>

    <p>
      저는 새로운 아이디어를 구상하고 이를 직접 구현하는 과정을 좋아합니다.
      특히 프로그래밍과 게임 제작에 관심이 있으며,
      다양한 기술을 학습하여 완성도 높은 게임을 개발하는 것을 목표로 하고 있습니다.
    </p>

    <div class="grid">
      <div class="panel">
        <div class="panel-title">이름</div>
        <div class="panel-text">문주현</div>
      </div>
      <div class="panel">
        <div class="panel-title">학년</div>
        <div class="panel-text">고등학교 1학년</div>
      </div>
      <div class="panel">
        <div class="panel-title">관심 분야</div>
        <div class="panel-text">프로그래밍, 게임 개발</div>
      </div>
      <div class="panel">
        <div class="panel-title">목표</div>
        <div class="panel-text">게임개발자</div>
      </div>
    </div>

    <div class="footer">© 2026 Moon Juhyeon</div>
  </div>

  <script>
    const card = document.getElementById("card");
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const mouse = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2
    };

    const segmentCount = 10;   // 길이 제한
    const spacing = 18;        // 조각 간격
    const segments = [];

    for (let i = 0; i < segmentCount; i++) {
      segments.push({
        x: mouse.x,
        y: mouse.y,
        angle: 0,
        width: Math.max(16, 24 - i * 0.8),
        height: Math.max(10, 16 - i * 0.4)
      });
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;

      const rect = card.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const rotateY = (e.clientX - centerX) / 30;
      const rotateX = (centerY - e.clientY) / 30;

      card.style.transform =
        `perspective(1000px) rotateX(${rotateX * 0.4}deg) rotateY(${rotateY * 0.4}deg)`;

      card.style.boxShadow =
        `${-rotateY * 1.5}px ${rotateX * 1.5 + 20}px 60px rgba(0,0,0,0.4)`;
    });

    window.addEventListener("mouseleave", () => {
      card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg)";
      card.style.boxShadow = "0 20px 60px rgba(0,0,0,0.4)";
    });

    function drawSegment(seg, index) {
      ctx.save();
      ctx.translate(seg.x, seg.y);
      ctx.rotate(seg.angle);

      const w = seg.width;
      const h = seg.height;

      const grad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
      grad.addColorStop(0, "#020202");
      grad.addColorStop(0.5, "#1a1a1a");
      grad.addColorStop(1, "#050505");

      ctx.fillStyle = grad;
      ctx.strokeStyle = "rgba(140, 140, 140, 0.28)";
      ctx.lineWidth = 1.2;

      roundRect(ctx, -w / 2, -h / 2, w, h, 4);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-w * 0.22, 0);
      ctx.lineTo(w * 0.22, 0);
      ctx.stroke();

      if (index === 0) {
        ctx.fillStyle = "#050505";
        roundRect(ctx, -w * 0.62, -h * 0.65, w * 1.15, h * 1.3, 5);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#7dd3fc";
        ctx.shadowColor = "#7dd3fc";
        ctx.shadowBlur = 8;

        ctx.fillRect(w * 0.08, -h * 0.22, 4, 3);
        ctx.fillRect(w * 0.08, h * 0.02, 4, 3);

        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const head = segments[0];
      head.x += (mouse.x - head.x) * 0.18;
      head.y += (mouse.y - head.y) * 0.18;

      for (let i = 1; i < segments.length; i++) {
        const prev = segments[i - 1];
        const seg = segments[i];

        const dx = prev.x - seg.x;
        const dy = prev.y - seg.y;
        const angle = Math.atan2(dy, dx);
        const dist = Math.hypot(dx, dy);

        seg.angle = angle;

        const targetX = prev.x - Math.cos(angle) * spacing;
        const targetY = prev.y - Math.sin(angle) * spacing;

        seg.x += (targetX - seg.x) * 0.35;
        seg.y += (targetY - seg.y) * 0.35;
      }

      head.angle = Math.atan2(mouse.y - head.y, mouse.x - head.x);

      for (let i = segments.length - 1; i >= 0; i--) {
        drawSegment(segments[i], i);
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>익명 고민 상담소</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#FFF8F0",
            peach: "#FDE2E4",
            lavender: "#E2D7F5",
            mint: "#D8F3DC",
            slateWarm: "#5B616B"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-cream text-slateWarm min-h-screen">
  <main class="max-w-5xl mx-auto p-4 md:p-8 grid gap-6 md:grid-cols-3">
    <section class="md:col-span-1 bg-white/80 backdrop-blur rounded-2xl shadow p-5">
      <h1 class="text-2xl font-bold mb-2">익명 고민 상담소</h1>
      <p class="text-sm mb-4">익명으로 고민을 남기고, 서로의 이야기에 공감해요.</p>

      <form id="postForm" class="space-y-3">
        <select id="category" class="w-full rounded-xl border border-peach p-2" required>
          <option value="학업">학업</option>
          <option value="친구">친구</option>
          <option value="기타">기타</option>
        </select>
        <textarea id="content" rows="5" maxlength="500" class="w-full rounded-xl border border-peach p-3" placeholder="고민을 작성하세요..." required></textarea>
        <input id="password" type="password" maxlength="20" class="w-full rounded-xl border border-peach p-2" placeholder="삭제용 비밀번호" required />
        <button type="submit" class="w-full bg-lavender hover:bg-purple-200 rounded-xl p-2 font-semibold">등록하기</button>
      </form>
    </section>

    <section class="md:col-span-2 bg-white/80 backdrop-blur rounded-2xl shadow p-5">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-semibold">최근 고민</h2>
        <select id="filterCategory" class="rounded-xl border border-lavender p-2 text-sm">
          <option value="전체">전체</option>
          <option value="학업">학업</option>
          <option value="친구">친구</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div id="loading" class="hidden py-6 text-center">
        <div class="inline-block w-8 h-8 border-4 border-lavender border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-2 text-sm">데이터를 불러오는 중...</p>
      </div>

      <ul id="postList" class="space-y-3"></ul>
    </section>
  </main>

  <dialog id="detailDialog" class="rounded-2xl p-0 w-[95%] max-w-2xl">
    <div class="p-5 bg-white">
      <div class="flex justify-between items-start gap-3">
        <div>
          <h3 id="detailCategory" class="font-bold text-lg"></h3>
          <p id="detailTime" class="text-xs text-gray-500"></p>
        </div>
        <div class="flex gap-2">
          <button id="deleteBtn" class="px-3 py-1 rounded-lg bg-peach text-sm">삭제</button>
          <button id="closeDialog" class="px-3 py-1 rounded-lg bg-gray-100 text-sm">닫기</button>
        </div>
      </div>
      <p id="detailContent" class="my-4 whitespace-pre-wrap"></p>

      <hr class="my-3" />
      <h4 class="font-semibold mb-2">댓글</h4>
      <form id="commentForm" class="flex gap-2 mb-3">
        <input id="commentInput" type="text" maxlength="300" class="flex-1 border rounded-lg p-2" placeholder="따뜻한 댓글을 남겨주세요" required />
        <button class="px-4 rounded-lg bg-mint">등록</button>
      </form>
      <ul id="commentList" class="space-y-2"></ul>
    </div>
  </dialog>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      serverTimestamp,
      doc,
      getDoc,
      deleteDoc,
      where,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    // TODO: 본인 Firebase 프로젝트 설정으로 교체
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const bannedWords = ["바보", "멍청이"];
    const postForm = document.getElementById("postForm");
    const postList = document.getElementById("postList");
    const filterCategory = document.getElementById("filterCategory");
    const loading = document.getElementById("loading");
    const detailDialog = document.getElementById("detailDialog");
    const detailContent = document.getElementById("detailContent");
    const detailCategory = document.getElementById("detailCategory");
    const detailTime = document.getElementById("detailTime");
    const deleteBtn = document.getElementById("deleteBtn");
    const closeDialog = document.getElementById("closeDialog");
    const commentForm = document.getElementById("commentForm");
    const commentInput = document.getElementById("commentInput");
    const commentList = document.getElementById("commentList");

    let selectedPostId = null;
    let commentUnsubscribe = null;

    function containsBannedWord(text) {
      const normalized = (text || "").trim();
      return bannedWords.some((word) => normalized.includes(word));
    }

    function sanitizeText(text) {
      return (text || "").replace(/[&<>'"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      })[char]);
    }

    function formatRelativeTime(date) {
      if (!date) return "방금 전";
      const diffSec = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diffSec < 60) return "방금 전";
      if (diffSec < 3600) return `${Math.floor(diffSec / 60)}분 전`;
      if (diffSec < 86400) return `${Math.floor(diffSec / 3600)}시간 전`;
      return `${Math.floor(diffSec / 86400)}일 전`;
    }

    function setLoading(isLoading) {
      loading.classList.toggle("hidden", !isLoading);
    }

    async function createPost(event) {
      event.preventDefault();
      const category = document.getElementById("category").value;
      const content = document.getElementById("content").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!content) {
        alert("내용을 입력해주세요.");
        return;
      }
      if (containsBannedWord(content)) {
        alert("부적절한 단어가 포함되어 있습니다");
        return;
      }

      await addDoc(collection(db, "posts"), {
        category,
        content: sanitizeText(content),
        password,
        createdAt: serverTimestamp()
      });

      postForm.reset();
      await loadPosts();
    }

    async function loadPosts() {
      setLoading(true);
      postList.innerHTML = "";

      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      const filter = filterCategory.value;

      snapshot.forEach((item) => {
        const data = item.data();
        if (filter !== "전체" && data.category !== filter) return;
        const createdDate = data.createdAt?.toDate ? data.createdAt.toDate() : null;

        const li = document.createElement("li");
        li.className = "p-3 border border-lavender rounded-xl bg-white cursor-pointer hover:bg-purple-50";
        li.innerHTML = `
          <div class="flex justify-between text-sm mb-1">
            <span class="font-semibold">${data.category}</span>
            <span class="text-gray-500">${formatRelativeTime(createdDate)}</span>
          </div>
          <p class="line-clamp-2">${data.content}</p>
        `;

        li.addEventListener("click", () => openPostDetail(item.id));
        postList.appendChild(li);
      });

      setLoading(false);
    }

    async function openPostDetail(postId) {
      selectedPostId = postId;
      const postRef = doc(db, "posts", postId);
      const snap = await getDoc(postRef);
      if (!snap.exists()) return;

      const data = snap.data();
      detailCategory.textContent = `카테고리: ${data.category}`;
      detailContent.textContent = data.content;
      detailTime.textContent = formatRelativeTime(data.createdAt?.toDate?.());
      detailDialog.showModal();

      bindComments(postId);
    }

    async function createComment(event) {
      event.preventDefault();
      if (!selectedPostId) return;
      const content = commentInput.value.trim();
      if (!content) return;
      if (containsBannedWord(content)) {
        alert("부적절한 단어가 포함되어 있습니다");
        return;
      }

      await addDoc(collection(db, "comments"), {
        postId: selectedPostId,
        content: sanitizeText(content),
        createdAt: serverTimestamp()
      });
      commentInput.value = "";
    }

    function bindComments(postId) {
      if (commentUnsubscribe) commentUnsubscribe();
      const q = query(collection(db, "comments"), where("postId", "==", postId), orderBy("createdAt", "asc"));

      commentUnsubscribe = onSnapshot(q, (snapshot) => {
        commentList.innerHTML = "";
        snapshot.forEach((item) => {
          const data = item.data();
          const li = document.createElement("li");
          li.className = "p-2 rounded-lg bg-gray-50 text-sm";
          li.textContent = `${data.content} · ${formatRelativeTime(data.createdAt?.toDate?.())}`;
          commentList.appendChild(li);
        });
      });
    }

    async function deletePost() {
      if (!selectedPostId) return;
      const inputPassword = prompt("삭제용 비밀번호를 입력하세요:");
      if (!inputPassword) return;

      const snap = await getDoc(doc(db, "posts", selectedPostId));
      if (!snap.exists()) return;

      const data = snap.data();
      if (data.password !== inputPassword) {
        alert("비밀번호가 일치하지 않습니다.");
        return;
      }

      await deleteDoc(doc(db, "posts", selectedPostId));
      alert("삭제되었습니다.");
      detailDialog.close();
      await loadPosts();
    }

    postForm.addEventListener("submit", createPost);
    filterCategory.addEventListener("change", loadPosts);
    commentForm.addEventListener("submit", createComment);
    deleteBtn.addEventListener("click", deletePost);
    closeDialog.addEventListener("click", () => detailDialog.close());

    loadPosts();
  </script>
</body>
</html>

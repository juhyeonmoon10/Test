<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문주현 소개 페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    .subtitle {
      font-size: 20px;
      color: #dbeafe;
      margin-bottom: 24px;
    }

    p {
      line-height: 1.8;
      font-size: 17px;
      color: #f8fafc;
      margin: 0 0 16px;
    }

    .dream {
      margin-top: 28px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
    }

    .dream h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .footer {
      margin-top: 28px;
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>문주현</h1>
    <div class="subtitle">고등학교 1학년</div>

    <p>
      안녕하세요! 저는 문주현입니다.
      현재 고등학교 1학년에 재학 중이며, 프로그래밍과 게임에 관심이 많습니다.
    </p>

    <p>
      새로운 것을 배우고 직접 만들어 보는 것을 좋아하며,
      앞으로 다양한 기술을 익혀 재미있고 창의적인 게임을 만드는 개발자가 되고 싶습니다.
    </p>

    <div class="dream">
      <h2>나의 꿈</h2>
      <p>사람들이 즐겁게 플레이할 수 있는 게임을 만드는 게임개발자가 되는 것입니다.</p>
    </div>

    <div class="footer">© 2026 문주현</div>
  </div>
</body>
</html>

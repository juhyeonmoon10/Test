<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문주현 | 소개 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(168, 85, 247, 0.14), transparent 25%),
        linear-gradient(135deg, #0b1120, #111827 45%, #1e293b 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
      position: relative;
      z-index: 2;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .highlight {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 18px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
      color: #e5e7eb;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .panel {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .panel-title {
      font-size: 13px;
      color: #93c5fd;
      margin-bottom: 6px;
    }

    .panel-text {
      font-size: 16px;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 28px 22px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <canvas id="snakeCanvas"></canvas>

  <div class="card" id="card">
    <h1>안녕하세요, 저는 <span class="highlight">문주현</span>입니다.</h1>
    <div class="subtitle">고등학교 1학년 · 게임개발자를 꿈꾸고 있습니다.</div>

    <p>
      저는 새로운 아이디어를 구상하고 이를 직접 구현하는 과정을 좋아합니다.
      특히 프로그래밍과 게임 제작에 관심이 있으며,
      다양한 기술을 학습하여 완성도 높은 게임을 개발하는 것을 목표로 하고 있습니다.
    </p>

    <div class="grid">
      <div class="panel">
        <div class="panel-title">이름</div>
        <div class="panel-text">문주현</div>
      </div>
      <div class="panel">
        <div class="panel-title">학년</div>
        <div class="panel-text">고등학교 1학년</div>
      </div>
      <div class="panel">
        <div class="panel-title">관심 분야</div>
        <div class="panel-text">프로그래밍, 게임 개발</div>
      </div>
      <div class="panel">
        <div class="panel-title">목표</div>
        <div class="panel-text">게임개발자</div>
      </div>
    </div>

    <div class="footer">© 2026 Moon Juhyeon</div>
  </div>

  <script>
    const card = document.getElementById("card");
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const mouse = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2
    };

    const segmentCount = 22;
    const spacing = 16;
    const segments = [];

    for (let i = 0; i < segmentCount; i++) {
      segments.push({
        x: mouse.x,
        y: mouse.y,
        angle: 0,
        width: Math.max(18, 34 - i * 0.7),
        height: Math.max(12, 22 - i * 0.35)
      });
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;

      const rect = card.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const rotateY = (e.clientX - centerX) / 30;
      const rotateX = (centerY - e.clientY) / 30;

      card.style.transform =
        `perspective(1000px) rotateX(${rotateX * 0.4}deg) rotateY(${rotateY * 0.4}deg)`;

      card.style.boxShadow =
        `${-rotateY * 1.5}px ${rotateX * 1.5 + 20}px 60px rgba(0,0,0,0.4)`;
    });

    window.addEventListener("mouseleave", () => {
      card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg)";
      card.style.boxShadow = "0 20px 60px rgba(0,0,0,0.4)";
    });

    function drawArrowPlate(w, h) {
      const tip = w * 0.28;
      const inset = w * 0.14;
      const cut = h * 0.24;

      ctx.beginPath();
      ctx.moveTo(-w / 2 + inset, -h / 2);
      ctx.lineTo(w / 2 - tip, -h / 2);
      ctx.lineTo(w / 2, 0);
      ctx.lineTo(w / 2 - tip, h / 2);
      ctx.lineTo(-w / 2 + inset, h / 2);
      ctx.lineTo(-w / 2, h / 2 - cut);
      ctx.lineTo(-w / 2, -h / 2 + cut);
      ctx.closePath();
    }

    function drawInnerPlate(w, h) {
      const tip = w * 0.2;
      const inset = w * 0.08;
      const cut = h * 0.16;

      ctx.beginPath();
      ctx.moveTo(-w / 2 + inset, -h / 2);
      ctx.lineTo(w / 2 - tip, -h / 2);
      ctx.lineTo(w / 2, 0);
      ctx.lineTo(w / 2 - tip, h / 2);
      ctx.lineTo(-w / 2 + inset, h / 2);
      ctx.lineTo(-w / 2, h / 2 - cut);
      ctx.lineTo(-w / 2, -h / 2 + cut);
      ctx.closePath();
    }

    function drawHead(w, h) {
      const nose = w * 0.34;
      const back = w * 0.2;
      const cut = h * 0.28;

      ctx.beginPath();
      ctx.moveTo(-w / 2 + back, -h / 2);
      ctx.lineTo(w / 2 - nose, -h / 2);
      ctx.lineTo(w / 2, 0);
      ctx.lineTo(w / 2 - nose, h / 2);
      ctx.lineTo(-w / 2 + back, h / 2);
      ctx.lineTo(-w / 2, h / 2 - cut);
      ctx.lineTo(-w / 2, -h / 2 + cut);
      ctx.closePath();
    }

    function drawSegment(seg, index) {
      ctx.save();
      ctx.translate(seg.x, seg.y);
      ctx.rotate(seg.angle);

      const w = seg.width;
      const h = seg.height;

      if (index === 0) {
        const hw = w * 1.25;
        const hh = h * 1.25;

        const headGrad = ctx.createLinearGradient(-hw / 2, -hh / 2, hw / 2, hh / 2);
        headGrad.addColorStop(0, "#020202");
        headGrad.addColorStop(0.45, "#171717");
        headGrad.addColorStop(0.75, "#2a2a2a");
        headGrad.addColorStop(1, "#060606");

        ctx.fillStyle = headGrad;
        ctx.strokeStyle = "rgba(190,190,190,0.18)";
        ctx.lineWidth = 1.2;
        drawHead(hw, hh);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.save();
        ctx.scale(0.82, 0.62);
        drawHead(hw, hh);
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.moveTo(-hw * 0.14, 0);
        ctx.lineTo(hw * 0.18, 0);
        ctx.stroke();

        ctx.fillStyle = "#7dd3fc";
        ctx.shadowColor = "#7dd3fc";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(hw * 0.16, -hh * 0.16, 2.4, 0, Math.PI * 2);
        ctx.arc(hw * 0.16, hh * 0.16, 2.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        const grad = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
        grad.addColorStop(0, "#030303");
        grad.addColorStop(0.45, "#1b1b1b");
        grad.addColorStop(0.75, "#2c2c2c");
        grad.addColorStop(1, "#070707");

        ctx.fillStyle = grad;
        ctx.strokeStyle = "rgba(170,170,170,0.16)";
        ctx.lineWidth = 1.05;
        drawArrowPlate(w, h);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.save();
        ctx.scale(0.78, 0.56);
        drawInnerPlate(w, h);
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = "rgba(255,255,255,0.07)";
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(-w * 0.18, 0);
        ctx.lineTo(w * 0.16, 0);
        ctx.stroke();
      }

      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const head = segments[0];
      head.x += (mouse.x - head.x) * 0.17;
      head.y += (mouse.y - head.y) * 0.17;

      for (let i = 1; i < segments.length; i++) {
        const prev = segments[i - 1];
        const seg = segments[i];

        const dx = prev.x - seg.x;
        const dy = prev.y - seg.y;
        const angle = Math.atan2(dy, dx);

        seg.angle = angle;

        const targetX = prev.x - Math.cos(angle) * spacing;
        const targetY = prev.y - Math.sin(angle) * spacing;

        seg.x += (targetX - seg.x) * 0.32;
        seg.y += (targetY - seg.y) * 0.32;
      }

      head.angle = Math.atan2(mouse.y - head.y, mouse.x - head.x);

      for (let i = segments.length - 1; i >= 0; i--) {
        drawSegment(segments[i], i);
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>

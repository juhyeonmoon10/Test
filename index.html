<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문주현 | 소개 페이지</title>

  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.2), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(168, 85, 247, 0.15), transparent 25%),
        linear-gradient(135deg, #0f172a, #111827 45%, #1e293b 100%);
      color: white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    /* 카드 */
    .card {
      width:100%;
      max-width:720px;
      padding:40px;
      border-radius:24px;
      background:rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
      text-align:center;
      position:relative;
      z-index:1;
    }

    h1 {
      font-size:42px;
      margin-bottom:10px;
    }

    .highlight {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size:18px;
      color:#cbd5f5;
      margin-bottom:20px;
    }

    p {
      font-size:16px;
      line-height:1.8;
      color:#e5e7eb;
      margin-bottom:16px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:20px;
    }

    .panel {
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
    }

    .panel-title {
      font-size:13px;
      color:#93c5fd;
      margin-bottom:6px;
    }

    .panel-text {
      font-size:16px;
      font-weight:bold;
    }

    .footer {
      margin-top:20px;
      font-size:13px;
      color:#94a3b8;
    }

    /* ===== 스모크 효과 ===== */
    .smoke {
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100vh;
      pointer-events:none;
      z-index:0;
    }

    .circle {
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle,
        rgba(255,255,255,0.8) 0%,
        rgba(255,255,255,0.5) 20%,
        rgba(255,255,255,0.1) 50%);
      animation:1s sizeup ease-out forwards;
    }

    @keyframes sizeup {
      0% {
        scale:0;
        transform:translateY(0);
      }
      100% {
        scale:15;
        opacity:0;
        transform:translateY(-10px);
      }
    }

    @media (max-width:600px){
      .grid {
        grid-template-columns:1fr;
      }
    }

  </style>
</head>

<body>

  <!-- 스모크 레이어 -->
  <div class="smoke"></div>

  <div class="card">
    <h1>안녕하세요, 저는 <span class="highlight">문주현</span>입니다.</h1>
    <div class="subtitle">고등학교 1학년 · 게임개발자를 꿈꾸고 있습니다.</div>

    <p>
      저는 새로운 아이디어를 구상하고 이를 직접 구현하는 과정을 좋아합니다.
      특히 프로그래밍과 게임 제작에 관심이 있으며,
      앞으로 다양한 기술을 학습하여 완성도 높은 게임을 개발하는 것이 목표입니다.
    </p>

    <div class="grid">
      <div class="panel">
        <div class="panel-title">이름</div>
        <div class="panel-text">문주현</div>
      </div>
      <div class="panel">
        <div class="panel-title">학년</div>
        <div class="panel-text">고등학교 1학년</div>
      </div>
      <div class="panel">
        <div class="panel-title">관심 분야</div>
        <div class="panel-text">프로그래밍, 게임 개발</div>
      </div>
      <div class="panel">
        <div class="panel-title">목표</div>
        <div class="panel-text">게임개발자</div>
      </div>
    </div>

    <div class="footer">© 2026 Moon Juhyeon</div>
  </div>

  <script>
    const smoke = document.querySelector(".smoke");

    function createSmokeEffect(e){
      const circle = document.createElement("div");
      circle.classList.add("circle");

      circle.style.left = `${e.clientX}px`;
      circle.style.top = `${e.clientY}px`;

      smoke.appendChild(circle);

      circle.addEventListener("animationend",()=>{
        circle.remove();
      });
    }

    window.addEventListener("mousemove", createSmokeEffect);
  </script>

</body>
</html>

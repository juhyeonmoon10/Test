<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문주현 | Game Developer</title>
</head>

<body style="margin:0; font-family: 'Segoe UI', sans-serif; background:black; color:white; overflow:hidden;">

  <!-- 배경 애니메이션 -->
  <div style="
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, #0f172a, black);
    z-index:-1;
  "></div>

  <!-- 메인 카드 -->
  <div style="
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  ">
    <div style="
      width:700px;
      max-width:90%;
      padding:50px;
      border-radius:20px;
      background:rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      box-shadow:0 0 30px rgba(0,255,255,0.3);
      text-align:center;
      animation:fadeIn 2s ease;
    ">

      <h1 style="
        font-size:48px;
        margin-bottom:10px;
        color:#00ffff;
        text-shadow:0 0 15px #00ffff;
      ">
        문주현
      </h1>

      <p style="font-size:20px; color:#94a3b8;">
        고등학교 1학년 | 미래의 게임개발자 🎮
      </p>

      <p style="
        margin-top:25px;
        font-size:18px;
        line-height:1.8;
        color:#e2e8f0;
      ">
        게임을 사랑하고, 직접 게임을 만드는 것을 목표로 하고 있습니다.<br>
        앞으로 다양한 기술을 배우며<br>
        사람들에게 재미와 감동을 주는 게임을 만들고 싶습니다.
      </p>

      <!-- 스킬 느낌 -->
      <div style="margin-top:30px;">
        <h2 style="color:#38bdf8;">🚀 목표</h2>
        <p style="color:#cbd5e1;">
          창의적인 게임 제작 + 많은 사람들에게 즐거움 제공
        </p>
      </div>

      <!-- 버튼 -->
      <div style="margin-top:35px;">
        <a href="https://github.com/" target="_blank" style="
          display:inline-block;
          padding:12px 25px;
          border-radius:30px;
          background:#00ffff;
          color:black;
          font-weight:bold;
          text-decoration:none;
          box-shadow:0 0 15px #00ffff;
          transition:0.3s;
        " onmouseover="this.style.background='#22d3ee'"
           onmouseout="this.style.background='#00ffff'">
          GitHub 보러가기
        </a>
      </div>

      <p style="margin-top:30px; font-size:14px; color:#64748b;">
        © 2026 문주현
      </p>

    </div>
  </div>

  <!-- 애니메이션 -->
  <style>
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>

</body>
</html>
